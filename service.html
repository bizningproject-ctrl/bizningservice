<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handly — Professionals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #1B2E4A;
      --navy-light: #2D4A6F;
      --blue: #3B82F6;
      --blue-light: #60A5FA;
      --blue-glow: #93C5FD;
      --ice: #F0F4F8;
      --ice-dark: #E2E8F0;
      --slate: #94A3B8;
      --charcoal: #0F172A;
      --white: #FFFFFF;
      --blue-deep: #2563EB;
      --mist: #7C9CBF;
      --mist-light: #BAD0E8;

      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Outfit', system-ui, sans-serif;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--ice);
      color: var(--charcoal);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 1rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(240, 244, 248, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(27, 46, 74, 0.06);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.6rem;
      color: var(--navy);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--blue);
      border-radius: 50%;
      animation: pulse-dot 2.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }

    .nav-back {
      text-decoration: none;
      color: var(--navy-light);
      font-weight: 500;
      font-size: 0.92rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.3s;
    }

    .nav-back:hover { color: var(--blue); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 3rem 3rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .page-header .breadcrumb {
      font-size: 0.82rem;
      color: var(--slate);
      margin-bottom: 1rem;
    }

    .page-header .breadcrumb a {
      color: var(--blue);
      text-decoration: none;
    }

    .page-header .breadcrumb a:hover { text-decoration: underline; }

    .page-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
      color: var(--navy);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .page-header h1 .count {
      font-weight: 400;
      font-size: 0.5em;
      color: var(--slate);
      vertical-align: middle;
    }

    .page-header .page-desc {
      font-size: 1.05rem;
      color: var(--navy-light);
      font-weight: 300;
      max-width: 600px;
    }

    /* ── FILTERS ── */
    .filters {
      padding: 0 3rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      background: var(--white);
      border: 1.5px solid rgba(27, 46, 74, 0.1);
      padding: 0.5rem 1.2rem;
      border-radius: 100px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--navy-light);
      cursor: pointer;
      transition: all 0.3s var(--ease-out-expo);
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }

    .filter-sort {
      margin-left: auto;
      background: var(--white);
      border: 1.5px solid rgba(27, 46, 74, 0.1);
      padding: 0.5rem 1.2rem;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--navy-light);
      cursor: pointer;
    }

    /* ── PRO LIST ── */
    .pro-list {
      padding: 0 3rem 4rem;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }

    .pro-item {
      background: var(--white);
      border-radius: 20px;
      padding: 1.5rem;
      border: 1.5px solid rgba(27, 46, 74, 0.05);
      display: flex;
      gap: 1.2rem;
      align-items: flex-start;
      cursor: pointer;
      transition: all 0.4s var(--ease-out-expo);
      animation: fadeIn 0.6s var(--ease-out-expo) both;
    }

    .pro-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(27, 46, 74, 0.1);
      border-color: var(--blue);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pro-avatar {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
      position: relative;
    }

    .pro-avatar .online-dot {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 14px;
      height: 14px;
      background: #22C55E;
      border: 3px solid var(--white);
      border-radius: 50%;
    }

    .pro-body { flex: 1; min-width: 0; }

    .pro-body h3 {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--charcoal);
      margin-bottom: 0.15rem;
    }

    .pro-body .pro-specialty {
      font-size: 0.82rem;
      color: var(--navy-light);
      font-weight: 400;
      margin-bottom: 0.6rem;
    }

    .pro-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }

    .pro-tag {
      background: rgba(59, 130, 246, 0.08);
      color: var(--blue);
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .pro-stats {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .pro-stats .stat {
      font-size: 0.8rem;
      color: var(--slate);
    }

    .pro-stats .stat strong {
      color: var(--charcoal);
      font-weight: 600;
    }

    .pro-stats .rating {
      color: #F59E0B;
      font-weight: 700;
    }

    .pro-right {
      text-align: right;
      flex-shrink: 0;
    }

    .pro-right .price {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--navy);
    }

    .pro-right .price-unit {
      font-size: 0.72rem;
      color: var(--slate);
      display: block;
      margin-bottom: 0.8rem;
    }

    .btn-book {
      background: var(--blue);
      color: var(--white);
      border: none;
      padding: 0.55rem 1.2rem;
      border-radius: 10px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.3s var(--ease-out-expo);
    }

    .btn-book:hover {
      background: var(--blue-deep);
      transform: scale(1.04);
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: rgba(34, 197, 94, 0.1);
      color: #16A34A;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 0.4rem;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      grid-column: 1 / -1;
    }

    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: var(--slate);
      font-weight: 300;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .page-header { padding: 2rem 1.5rem 1.5rem; }
      .filters { padding: 0 1.5rem 1.5rem; }
      .pro-list { padding: 0 1.5rem 3rem; grid-template-columns: 1fr; }
      .pro-item { flex-wrap: wrap; }
      .pro-right { width: 100%; text-align: left; display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; padding-top: 0.8rem; border-top: 1px solid rgba(27, 46, 74, 0.06); }
    }
  </style>
</head>
<body>

  <nav>

    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const serviceType = params.get('type') || 'plumbing';
    const service = serviceData[serviceType] || serviceData.plumbing;

    // Set page content
    document.title = `Handly — ${service.title}`;
    document.getElementById('breadcrumbService').textContent = service.breadcrumb;
    document.getElementById('pageTitle').innerHTML = `${service.title} <span class="count" id="proCount">(${service.pros.length} available)</span>`;
    document.getElementById('pageDesc').textContent = service.desc;

    // Render pros
    function renderPros(pros) {
      const list = document.getElementById('proList');
      list.innerHTML = '';

      if (pros.length === 0) {
        list.innerHTML = `<div class="empty-state"><h3>No professionals found</h3><p>Try adjusting your filters to see more results.</p></div>`;
        return;
      }

      pros.forEach((pro, i) => {
        const card = document.createElement('div');
        card.className = 'pro-item';
        card.style.animationDelay = `${i * 0.08}s`;

        card.innerHTML = `
          <div class="pro-avatar" style="background: ${service.gradient}">
            ${service.icon}
            ${pro.online ? '<span class="online-dot"></span>' : ''}
          </div>
          <div class="pro-body">
            <h3>${pro.name}${pro.verified ? '<span class="verified-badge">\u2713 Verified</span>' : ''}</h3>
            <div class="pro-specialty">${pro.specialty} \u2022 ${pro.exp}</div>
            <div class="pro-tags">
              ${pro.tags.map(t => `<span class="pro-tag">${t}</span>`).join('')}
            </div>
            <div class="pro-stats">
              <span class="stat"><span class="rating">\u2605 ${pro.rating}</span></span>
              <span class="stat"><strong>${pro.jobs.toLocaleString()}</strong> jobs</span>
            </div>
          </div>
          <div class="pro-right">
            <span class="price">$${pro.price}</span>
            <span class="price-unit">/hour</span>
            <button class="btn-book">Book Now</button>
          </div>
        `;

        list.appendChild(card);
      });
    }

    renderPros(service.pros);

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        let filtered = [...service.pros];

        if (filter === 'top-rated') filtered = filtered.filter(p => p.rating >= 4.8);
        else if (filter === 'verified') filtered = filtered.filter(p => p.verified);
        else if (filter === 'available-now') filtered = filtered.filter(p => p.online);

        renderPros(filtered);
        document.getElementById('proCount').textContent = `(${filtered.length} available)`;
      });
    });

    // Sort
    document.getElementById('sortSelect').addEventListener('change', (e) => {
      const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
      let filtered = [...service.pros];

      if (activeFilter === 'top-rated') filtered = filtered.filter(p => p.rating >= 4.8);
      else if (activeFilter === 'verified') filtered = filtered.filter(p => p.verified);
      else if (activeFilter === 'available-now') filtered = filtered.filter(p => p.online);

      const sort = e.target.value;
      if (sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);
      else if (sort === 'price-low') filtered.sort((a, b) => a.price - b.price);
      else if (sort === 'price-high') filtered.sort((a, b) => b.price - a.price);
      else if (sort === 'jobs') filtered.sort((a, b) => b.jobs - a.jobs);

      renderPros(filtered);
    });
  </script>
</body>
</html>
